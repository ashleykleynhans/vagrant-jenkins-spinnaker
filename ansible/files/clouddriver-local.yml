    tasks:
      default:
        jdbcUrl: jdbc:mysql://spin-mariadb:3306/clouddriver
        user: spinnaker
        password: spinnaker
        driver: com.mysql.cj.jdbc.Driver
  migration:
    jdbcUrl: jdbc:mysql://spin-mariadb:3306/clouddriver
    user: spinnaker
    password: spinnaker
