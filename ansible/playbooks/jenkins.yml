---
- hosts: all
  become: true

  tasks:
    - name: Include task to install packages that enable apt over HTTPS
      ansible.builtin.include_tasks: includes/apt_over_https.yml

    - name: Include task to install useful packages
      ansible.builtin.include_tasks: includes/install_useful_packages.yml

    - name: Include task to install docker
      ansible.builtin.include_tasks: includes/install_docker.yml

    - name: Import and dearmor Jenkins GPG key from keyserver
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          gpg --keyserver keyserver.ubuntu.com --recv-keys 7198F4B714ABFC68
          gpg --export 7198F4B714ABFC68 > /usr/share/keyrings/jenkins-keyring.gpg
          chmod 644 /usr/share/keyrings/jenkins-keyring.gpg
        creates: /usr/share/keyrings/jenkins-keyring.gpg

    - name: Set Jenkins apt repository
      ansible.builtin.apt_repository:
        repo: deb [signed-by=/usr/share/keyrings/jenkins-keyring.gpg] https://pkg.jenkins.io/debian-stable binary/
        filename: jenkins
        state: present

    - name: Install Java and Jenkins
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
      loop:
        - openjdk-25-jre-headless
        - jenkins

    - name: Configure Jenkins to use Java 25
      ansible.builtin.lineinfile:
        path: /etc/default/jenkins
        regexp: '^JAVA_HOME='
        line: JAVA_HOME=/usr/lib/jvm/java-25-openjdk-arm64

    - name: Create Jenkins tmpdir on persistent storage
      ansible.builtin.file:
        path: /var/lib/jenkins/tmp
        state: directory
        owner: jenkins
        group: jenkins
        mode: "0755"

    - name: Configure Jenkins to use persistent tmpdir
      ansible.builtin.lineinfile:
        path: /etc/default/jenkins
        regexp: '^JAVA_ARGS='
        line: JAVA_ARGS="-Djava.awt.headless=true -Djava.io.tmpdir=/var/lib/jenkins/tmp"

    - name: Relax disk space monitor thresholds for dev VM
      community.general.xml:
        path: /var/lib/jenkins/nodeMonitors.xml
        xpath: /hudson.util.DescribableList/hudson.node__monitors.TemporarySpaceMonitor/freeSpaceThreshold
        value: 100MiB
      notify: restart jenkins

    - name: Relax temp space warning threshold for dev VM
      community.general.xml:
        path: /var/lib/jenkins/nodeMonitors.xml
        xpath: /hudson.util.DescribableList/hudson.node__monitors.TemporarySpaceMonitor/freeSpaceWarningThreshold
        value: 200MiB
      notify: restart jenkins

    - name: Relax disk space monitor thresholds for dev VM
      community.general.xml:
        path: /var/lib/jenkins/nodeMonitors.xml
        xpath: /hudson.util.DescribableList/hudson.node__monitors.DiskSpaceMonitor/freeSpaceThreshold
        value: 100MiB
      notify: restart jenkins

    - name: Relax disk space warning threshold for dev VM
      community.general.xml:
        path: /var/lib/jenkins/nodeMonitors.xml
        xpath: /hudson.util.DescribableList/hudson.node__monitors.DiskSpaceMonitor/freeSpaceWarningThreshold
        value: 200MiB
      notify: restart jenkins

    - name: Start Jenkins
      ansible.builtin.service:
        name: jenkins
        state: restarted
        enabled: yes

    - name: Get Admin password
      ansible.builtin.slurp:
        src: /var/lib/jenkins/secrets/initialAdminPassword
      register: admin_password

    - name: Print Admin password
      ansible.builtin.debug:
        msg: "{{ admin_password.content | b64decode | trim }}"

  # Setup a handler for restarting Docker daemon
  handlers:
    - name: restart docker
      ansible.builtin.service:
        name: docker
        state: restarted

    - name: restart jenkins
      ansible.builtin.service:
        name: jenkins
        state: restarted
