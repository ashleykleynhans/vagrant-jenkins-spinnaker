---
- name: Download spinnaker-community GPG key
  ansible.builtin.get_url:
    url: https://us-apt.pkg.dev/doc/repo-signing-key.gpg
    dest: /usr/share/keyrings/spinnaker-community.asc
    mode: "0644"

- name: Add spinnaker-community apt repository
  ansible.builtin.apt_repository:
    repo: deb [signed-by=/usr/share/keyrings/spinnaker-community.asc arch=all] https://us-apt.pkg.dev/projects/spinnaker-community apt main
    state: present
    filename: spinnaker

- name: Install Java
  ansible.builtin.apt:
    name: openjdk-17-jre-headless
    state: present

- name: Install Halyard
  ansible.builtin.apt:
    name: "spinnaker-halyard"
    state: latest

- name: Wait for Halyard service to start
  ansible.builtin.pause:
    seconds: 15
