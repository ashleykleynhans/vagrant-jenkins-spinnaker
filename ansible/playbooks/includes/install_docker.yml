---
- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /usr/share/keyrings/docker-keyring.asc
    mode: "0644"

- name: Add apt repository for stable version of Docker
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/docker-keyring.asc arch={{ vm_architecture }}] https://download.docker.com/linux/ubuntu resolute stable"
    state: present
    filename: docker

- name: Install docker and its dependencies
  ansible.builtin.apt:
    name: "{{ packages }}"
    state: present
    update_cache: yes
  vars:
    packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io

- name: Add vagrant user to docker group
  ansible.builtin.user:
    name: vagrant
    group: docker

- name: Copy docker.json to /etc/docker/daemon.json
  ansible.builtin.copy:
    src: ../files/docker.json
    dest: /etc/docker/daemon.json
    mode: 0600

- name: Enable and start docker
  ansible.builtin.systemd:
    name: docker
    state: restarted
    enabled: yes
    daemon_reload: yes
