---
- hosts: all
  become: true

  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    TERM: vt100

  tasks:
    - name: Include task to install packages that enable apt over HTTPS
      ansible.builtin.include_tasks: includes/apt_over_https.yml

    - name: Include task to install useful packages
      ansible.builtin.include_tasks: includes/install_useful_packages.yml

    - name: Include task to install Docker
      ansible.builtin.include_tasks: includes/install_docker.yml

    - name: Include task to install Minio as the S3 persistent storage backend
      ansible.builtin.include_tasks: includes/install_minio.yml

    - name: Install k3s
      ansible.builtin.shell:
        cmd: curl -sfL https://get.k3s.io | sh -
        creates: /usr/local/bin/k3s

    - name: Wait for k3s node to be ready
      ansible.builtin.shell:
        cmd: k3s kubectl get nodes | grep -q " Ready"
      register: node_ready
      until: node_ready.rc == 0
      retries: 30
      delay: 10

    - name: Create .kube directory for vagrant
      ansible.builtin.file:
        path: /home/vagrant/.kube
        state: directory
        owner: vagrant
        group: vagrant
        mode: "0755"

    - name: Copy kubeconfig for vagrant
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/vagrant/.kube/config
        owner: vagrant
        group: vagrant
        mode: "0600"
        remote_src: true

    - name: Create overlay directory
      ansible.builtin.file:
        path: /opt/spinnaker-overlay/files
        state: directory
        owner: vagrant
        group: vagrant
        mode: "0755"

    - name: Copy Spinnaker config files
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: vagrant
        group: vagrant
        mode: "0644"
      loop:
        - src: ../files/clouddriver-local.yml
          dest: /opt/spinnaker-overlay/files/clouddriver-local.yml
        - src: ../files/echo-local.yml
          dest: /opt/spinnaker-overlay/files/echo-local.yml
        - src: ../files/front50-local-k8s.yml
          dest: /opt/spinnaker-overlay/files/front50-local-k8s.yml
        - src: ../files/gate-local.yml
          dest: /opt/spinnaker-overlay/files/gate-local.yml
        - src: ../files/igor-local.yml
          dest: /opt/spinnaker-overlay/files/igor-local.yml
        - src: ../files/orca-local.yml
          dest: /opt/spinnaker-overlay/files/orca-local.yml

    - name: Generate kustomization.yml from template
      ansible.builtin.template:
        src: ../templates/spinnaker-kustomization.yml.j2
        dest: /opt/spinnaker-overlay/kustomization.yml
        owner: vagrant
        group: vagrant
        mode: "0644"

    - name: Build and apply Spinnaker manifests
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          k3s kubectl kustomize /opt/spinnaker-overlay | k3s kubectl apply -f -
      register: spinnaker_apply
      changed_when: "'created' in spinnaker_apply.stdout or 'configured' in spinnaker_apply.stdout"

    - name: Wait for Spinnaker pods
      ansible.builtin.shell:
        cmd: k3s kubectl wait --for=condition=Ready pods --all -n spinnaker --timeout=1800s
      register: pods_ready
      until: pods_ready.rc == 0
      retries: 3
      delay: 30

    - name: Show pod status
      ansible.builtin.shell:
        cmd: k3s kubectl get pods -n spinnaker
      register: pod_status

    - name: Print pod status
      ansible.builtin.debug:
        msg: "{{ pod_status.stdout_lines }}"
